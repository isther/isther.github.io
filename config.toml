title = "Ther's Blog"
theme = "docport"
baseURL = "https://www.niuwx.cn"
languageCode = "cn"
# DefaultContentLanguage = "en"
defaultContentLanguage = "cn"
pygmentsCodeFences = true
pygmentsStyle = "monokai"

disableAssetsBusting = false 

defaultContentLanguageInSubdir= false
enableMissingTranslationPlaceholders = false

[languages]
  [languages.cn]
    contentDir = "content/"

[outputs]
home = [ "HTML", "RSS", "JSON"]

[params]
ordersectionsby = "weight" # ordersectionsby = "title"
color_main = "#737373"
color_second = "#E24800"
# color_second = "#e66a4e"
disableSearch = false # default is false
disableNavChevron = true # set true to hide next/prev chevron, default is false
menushortcutsnewtab = false # set true to open shortcuts links to a new tab/window

editURL = "https://github.com/28251536/28251536.github.io/tree/master/content"
enableGitInfo = true

author = "ther" 
description = "Share life, share technology ..." 

disableInlineCopyToClipBoard = false

# Code highlight configuration
[markup.highlight]
codeFences = true
guessSyntax = true
hl_Lines = ""
lineNoStart = 1
lineNos = false
lineNumbersInTable = true
noClasses = true
style = "monokai"
tabWidth = 4

[[menu.shortcuts]]
name = "Github"
url = "https://github.com/28251536"
weight = 10

[mediaTypes]
  [mediaTypes."application/netlifyconfig"]
    suffixes = ["yml"]

[outputFormats]
[outputFormats.netlifyyaml]
mediaType = "application/netlifyconfig"
isPlainText = true
isHTML = false
notAlternative = true

[markup.goldmark.renderer]
unsafe = true